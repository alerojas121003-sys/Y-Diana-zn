<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cadence · Horarios de Customer Service</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B0C13; --ink2:#0E1020;
    --panel:rgba(255,255,255,0.035); --panel2:rgba(255,255,255,0.06);
    --line:rgba(255,255,255,0.09); --chalk:#EAEBF2;
    --mist:#9A9FB5; --faint:#686C84;
    --iris:#7C83FF; --iris2:#9aa0ff; --irisSoft:rgba(124,131,255,0.16);
    --amber:#F4B860; --mint:#5FD3A3; --rose:#FF6B81;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Inter',ui-sans-serif,system-ui,sans-serif;
    color:var(--chalk);
    background:
      radial-gradient(900px 500px at 78% -8%, rgba(124,131,255,0.16), transparent 60%),
      radial-gradient(700px 460px at 6% 108%, rgba(244,184,96,0.07), transparent 55%),
      linear-gradient(180deg,var(--ink),var(--ink2));
    min-height:100vh; -webkit-font-smoothing:antialiased;
  }
  .display{font-family:'Space Grotesk',ui-sans-serif,sans-serif;letter-spacing:-0.01em;}
  .mono{font-family:'JetBrains Mono',ui-monospace,monospace;}
  .glass{background:var(--panel);border:1px solid var(--line);border-radius:18px;backdrop-filter:blur(14px);}
  .lift{transition:transform .18s ease, box-shadow .18s ease, background .18s ease, border-color .18s ease;}
  .lift:hover{transform:translateY(-2px);}
  .navitem{transition:background .15s ease,color .15s ease;cursor:pointer;}
  .navitem:hover{background:var(--panel2);}
  .chip{transition:transform .14s ease, box-shadow .18s ease, border-color .15s ease;cursor:grab;user-select:none;}
  .chip:active{cursor:grabbing;}
  .chip:hover{transform:translateY(-2px);}
  .lane{transition:border-color .2s ease, background .2s ease;}
  .meter-fill{transition:width .55s cubic-bezier(.22,1,.36,1), background .3s ease;}
  .view{animation:fade .35s ease both;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  .pulse{animation:pulse 1.8s ease-in-out infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,107,129,0);}50%{box-shadow:0 0 0 6px rgba(255,107,129,0.10);}}
  .btn{cursor:pointer;border:none;font-family:inherit;transition:transform .14s ease,filter .18s ease,background .18s ease;}
  .btn:hover{transform:translateY(-1px);filter:brightness(1.06);}
  .btn:active{transform:translateY(0);}
  .scroll::-webkit-scrollbar{height:8px;width:8px;}
  .scroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px;}
  .toast{animation:slidein .3s ease both;}
  @keyframes slidein{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
  .selectedRing{box-shadow:0 0 0 2px var(--iris), 0 8px 24px rgba(124,131,255,.25)!important;}
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important;}}
  @media (max-width:820px){
    .rail-label{display:none!important;}
    .rail{width:62px!important;}
    .lbl{display:none;}
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ============================ ICONS ============================ */
var ICONS = {
  sparkles:'<path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .962 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.962 0z"/><path d="M20 3v4"/><path d="M22 5h-4"/><path d="M4 17v2"/><path d="M5 18H3"/>',
  dashboard:'<rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/>',
  calendar:'<path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/>',
  inbox:'<polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/>',
  users:'<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
  settings:'<path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>',
  send:'<path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/>',
  star:'<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>',
  alert:'<path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/>',
  check:'<path d="M20 6 9 17l-5-5"/>',
  help:'<circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/>',
  shield:'<path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/>',
  user:'<path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>',
  clock:'<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',
  x:'<path d="M18 6 6 18"/><path d="m6 6 12 12"/>'
};
function icon(name, o){
  o = o || {};
  var size = o.size || 24, color = o.color || 'currentColor', fill = o.fill || 'none', sw = o.sw || 2, style = o.style || '';
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="'+fill+'" stroke="'+color+'" stroke-width="'+sw+'" stroke-linecap="round" stroke-linejoin="round" style="'+style+'">'+ICONS[name]+'</svg>';
}

/* ============================ DATA ============================ */
var DEPTS = ["Deposits","3rd Party Squad","VIP","Processing Squad","Floor Supports","Payouts"];
var AGENTS = [
  { id:1, name:"Kevin Soto", dept:"Deposits", rating:4, skills:["Chats","Phones","Emails","Inbox","Pending"], sat:88 },
  { id:2, name:"María Vargas", dept:"VIP", rating:5, skills:["Chats","Phones","VIP","Tier 2","Casino"], sat:95 },
  { id:3, name:"Andrés Mora", dept:"3rd Party Squad", rating:3, skills:["Emails","Inbox","Pending","Processors"], sat:71 },
  { id:4, name:"Lucía Jiménez", dept:"Processing Squad", rating:4, skills:["Processors","Scrubbers","CC","Inbox"], sat:84 },
  { id:5, name:"Diego Rojas", dept:"Deposits", rating:2, skills:["Chats","Phones"], sat:62 },
  { id:6, name:"Sofía Castro", dept:"VIP", rating:5, skills:["VIP","Casino","Tier 2","Chats"], sat:93 },
  { id:7, name:"Bryan Núñez", dept:"Payouts", rating:3, skills:["Processors","CC","Inbox"], sat:76 },
  { id:8, name:"Valeria Solís", dept:"Floor Supports", rating:4, skills:["Chats","Phones","Emails"], sat:81 },
  { id:9, name:"Josué Araya", dept:"3rd Party Squad", rating:3, skills:["Phones","Chats","Tier 2"], sat:69 },
  { id:10, name:"Camila Vega", dept:"Deposits", rating:4, skills:["Chats","Emails","Inbox","Pending"], sat:86 },
  { id:11, name:"Esteban Quirós", dept:"Processing Squad", rating:2, skills:["Processors","Scrubbers"], sat:58 },
  { id:12, name:"Natalia Madrigal", dept:"VIP", rating:5, skills:["VIP","Tier 2","Casino","Chats","Phones"], sat:97 },
  { id:13, name:"Fabián León", dept:"Payouts", rating:3, skills:["Processors","CC"], sat:74 },
  { id:14, name:"Daniela Chacón", dept:"Floor Supports", rating:4, skills:["Chats","Phones","Tier 2"], sat:82 }
];
var AGENT_MAP = {}; AGENTS.forEach(function(a){ AGENT_MAP[a.id]=a; });
var TASKS = [
  { id:"phones", name:"Phones", req:4, skill:"Phones" },
  { id:"chats", name:"Chats", req:5, skill:"Chats" },
  { id:"casino", name:"Casino", req:2, skill:"Casino" },
  { id:"vip", name:"VIP", req:1, skill:"VIP" },
  { id:"tier2", name:"Tier 2", req:3, skill:"Tier 2" },
  { id:"processors", name:"Processors", req:3, skill:"Processors" },
  { id:"emails", name:"Emails", req:2, skill:"Emails" },
  { id:"inbox", name:"Inbox", req:2, skill:"Inbox" }
];
var TASK_MAP = {}; TASKS.forEach(function(t){ TASK_MAP[t.id]=t; });
var DAYS = ["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];

function initials(n){ return n.split(" ").map(function(w){return w[0];}).slice(0,2).join("").toUpperCase(); }
function autoAssign(dayIdx){
  var bench = AGENTS.map(function(a){return a.id;});
  var lanes = {};
  var order = TASKS.slice().sort(function(a,b){ return ((a.req+dayIdx)%TASKS.length) - ((b.req+dayIdx)%TASKS.length); });
  order.forEach(function(t){
    var eligible = bench.map(function(id){return AGENT_MAP[id];})
      .filter(function(a){return a.skills.indexOf(t.skill)>=0;})
      .sort(function(a,b){ return (b.rating-a.rating) || ((a.id+dayIdx)%5)-((b.id+dayIdx)%5); });
    var pick = eligible.slice(0,t.req).map(function(a){return a.id;});
    lanes[t.id]=pick;
    bench = bench.filter(function(id){ return pick.indexOf(id)<0; });
  });
  return { lanes:lanes, bench:bench };
}
function coverageState(count, req){
  if(count<req) return { key:"gap", color:"var(--rose)", label:"Faltan "+(req-count) };
  if(count>req) return { key:"over", color:"var(--amber)", label:"+"+(count-req) };
  return { key:"ok", color:"var(--mint)", label:"Cubierto" };
}

/* ============================ STATE ============================ */
var state = {
  schedule: DAYS.map(function(_,i){ return autoAssign(i); }),
  dayIdx: 4, view:"horario", role:"admin", sel:null, toast:null, why:false
};
var drag = null;
var toastTimer = null;

function fire(msg, type){
  state.toast = { msg:msg, type:type||"ok" };
  render();
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ state.toast=null; render(); }, 3200);
}
function moveAgent(id, from, to){
  if(from===to) return;
  if(to!=="bench"){
    var task = TASK_MAP[to];
    if(AGENT_MAP[id].skills.indexOf(task.skill)<0){
      fire(AGENT_MAP[id].name.split(" ")[0]+" no tiene el skill «"+task.skill+"» — movimiento bloqueado.","gap");
      return;
    }
  }
  var day = state.schedule[state.dayIdx];
  if(from==="bench") day.bench = day.bench.filter(function(x){return x!==id;});
  else day.lanes[from] = day.lanes[from].filter(function(x){return x!==id;});
  if(to==="bench"){ if(day.bench.indexOf(id)<0) day.bench.push(id); }
  else { if(day.lanes[to].indexOf(id)<0) day.lanes[to].push(id); }
}

/* ============================ HTML BUILDERS ============================ */
function starsHTML(n, size){
  size = size||12; var h="";
  for(var i=1;i<=5;i++){
    h += icon('star',{ size:size, sw:1.5, fill:(i<=n?'var(--amber)':'transparent'), color:(i<=n?'var(--amber)':'var(--line)') });
  }
  return '<span style="display:inline-flex;gap:2px">'+h+'</span>';
}
function avatarHTML(id, sel, from){
  var a = AGENT_MAP[id], hue=(id*47)%360;
  var selected = sel && sel.id===id && sel.from===from;
  var fn = a.name.split(" ");
  return '<div class="chip'+(selected?' selectedRing':'')+'" draggable="true" data-agent="'+id+'" data-from="'+from+'" title="'+a.name+' · '+a.dept+'" '+
    'style="display:flex;align-items:center;gap:8px;padding:4px 10px 4px 4px;border-radius:999px;border:1px solid var(--line);background:var(--panel2)">'+
      '<div class="display" style="width:30px;height:30px;border-radius:999px;flex-shrink:0;display:grid;place-items:center;font-size:11px;font-weight:700;color:#0B0C13;'+
        'background:linear-gradient(135deg, hsl('+hue+' 70% 72%), hsl('+((hue+40)%360)+' 80% 62%))">'+initials(a.name)+'</div>'+
      '<div style="line-height:1.05">'+
        '<div style="font-size:12px;font-weight:600;white-space:nowrap">'+fn[0]+' '+(fn[1]?fn[1][0]+'.':'')+'</div>'+
        '<div style="margin-top:2px">'+starsHTML(a.rating,9)+'</div>'+
      '</div>'+
    '</div>';
}
function scheduleHTML(){
  var day = state.schedule[state.dayIdx];
  var totalReq=0, totalCov=0;
  TASKS.forEach(function(t){ totalReq+=t.req; totalCov+=Math.min((day.lanes[t.id]||[]).length, t.req); });
  var pct = Math.round((totalCov/totalReq)*100);
  var pctColor = pct>=100?'var(--mint)':(pct>=85?'var(--amber)':'var(--rose)');

  var dayBtns = DAYS.map(function(d,i){
    return '<button class="btn" data-day="'+i+'" style="padding:8px 14px;border-radius:12px;font-size:13px;font-weight:600;'+
      'background:'+(i===state.dayIdx?'var(--iris)':'var(--panel2)')+';color:'+(i===state.dayIdx?'#0B0C13':'var(--mist)')+';border:1px solid var(--line)">'+d+'</button>';
  }).join("");

  var selBar = state.sel ? '<div class="toast" style="margin-bottom:12px;font-size:13px;color:var(--iris2);display:flex;align-items:center;gap:8px">'+
      '<span>Moviendo a <b>'+AGENT_MAP[state.sel.id].name+'</b> — tocá un carril para colocarlo.</span>'+
      '<button class="btn" data-act="cancelsel" style="background:var(--panel2);color:var(--mist);border-radius:8px;padding:3px 8px;font-size:12px;border:1px solid var(--line)">Cancelar</button>'+
    '</div>' : '';

  var lanes = TASKS.map(function(t){
    var ids = day.lanes[t.id]||[];
    var st = coverageState(ids.length, t.req);
    var fill = Math.min(100, (ids.length/t.req)*100);
    var chips = ids.length===0
      ? '<span style="font-size:12px;color:var(--faint);font-style:italic">Sin asignar — arrastrá o tocá un agente</span>'
      : ids.map(function(id){ return avatarHTML(id, state.sel, t.id); }).join("");
    return '<div class="lane glass lift'+(st.key==="gap"?' pulse':'')+'" data-lane="'+t.id+'" style="padding:16px;cursor:'+(state.sel?'pointer':'default')+'">'+
        '<div style="display:flex;justify-content:space-between;align-items:center">'+
          '<div class="display" style="font-weight:600;font-size:15px">'+t.name+'</div>'+
          '<div style="font-size:11px;font-weight:600;color:'+st.color+';background:var(--panel2);border:1px solid var(--line);padding:3px 8px;border-radius:999px">'+st.label+'</div>'+
        '</div>'+
        '<div style="display:flex;align-items:baseline;gap:6px;margin:8px 0 6px">'+
          '<span class="mono display" style="font-size:24px;font-weight:700;color:'+st.color+'">'+ids.length+'</span>'+
          '<span class="mono" style="font-size:13px;color:var(--faint)">/ '+t.req+'</span>'+
          '<span style="font-size:11px;color:var(--faint);margin-left:4px">requiere skill «'+t.skill+'»</span>'+
        '</div>'+
        '<div style="height:5px;border-radius:999px;background:var(--line);overflow:hidden;margin-bottom:12px">'+
          '<div class="meter-fill" style="height:100%;width:'+fill+'%;background:'+st.color+';border-radius:999px"></div>'+
        '</div>'+
        '<div style="display:flex;flex-wrap:wrap;gap:8px;min-height:38px">'+chips+'</div>'+
      '</div>';
  }).join("");

  var benchChips = day.bench.length===0
    ? '<span style="font-size:12px;color:var(--faint)">Todos asignados.</span>'
    : day.bench.map(function(id){ return avatarHTML(id, state.sel, "bench"); }).join("");

  return '<div class="view">'+
    '<div style="display:flex;flex-wrap:wrap;gap:14px;align-items:center;justify-content:space-between;margin-bottom:18px">'+
      '<div style="display:flex;gap:6px;flex-wrap:wrap">'+dayBtns+'</div>'+
      '<div class="glass" style="padding:8px 14px;display:flex;align-items:center;gap:10px">'+
        '<span style="font-size:12px;color:var(--mist)">Cobertura del día</span>'+
        '<span class="display mono" style="font-size:18px;font-weight:700;color:'+pctColor+'">'+pct+'%</span>'+
      '</div>'+
    '</div>'+
    selBar+
    '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px">'+lanes+'</div>'+
    '<div class="glass" data-drop="bench" style="margin-top:16px;padding:16px">'+
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">'+
        icon('clock',{size:15,color:'var(--mist)'})+
        '<span style="font-size:13px;font-weight:600;color:var(--mist)">Disponibles ('+day.bench.length+')</span>'+
        '<span style="font-size:11px;color:var(--faint)">— agentes sin task asignado este día</span>'+
      '</div>'+
      '<div class="scroll" style="display:flex;gap:8px;flex-wrap:wrap">'+benchChips+'</div>'+
    '</div>'+
  '</div>';
}

function miniBar(label,value,max,color){
  return '<div style="margin-bottom:12px">'+
    '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px"><span style="color:var(--mist)">'+label+'</span><span class="mono" style="color:var(--chalk)">'+value+'</span></div>'+
    '<div style="height:6px;border-radius:999px;background:var(--line);overflow:hidden"><div style="height:100%;width:'+((value/max)*100)+'%;background:'+color+';border-radius:999px"></div></div>'+
  '</div>';
}
function donut(pct,label){
  var r=42, c=2*Math.PI*r, off=c*(1-pct/100);
  return '<div style="display:flex;flex-direction:column;align-items:center"><svg width="120" height="120" viewBox="0 0 120 120">'+
    '<circle cx="60" cy="60" r="'+r+'" fill="none" stroke="var(--line)" stroke-width="10"/>'+
    '<circle cx="60" cy="60" r="'+r+'" fill="none" stroke="var(--iris)" stroke-width="10" stroke-linecap="round" stroke-dasharray="'+c+'" stroke-dashoffset="'+off+'" transform="rotate(-90 60 60)"/>'+
    '<text x="60" y="58" text-anchor="middle" class="display mono" font-size="22" font-weight="700" fill="var(--chalk)">'+pct+'%</text>'+
    '<text x="60" y="76" text-anchor="middle" font-size="9" fill="var(--mist)">'+label+'</text>'+
  '</svg></div>';
}
function heatmap(){
  var rows=["Phones","Chats","Casino","VIP","Tier 2"], cols=["6","8","10","12","14","16","18","20","22"];
  var h='<div style="display:grid;grid-template-columns:70px repeat('+cols.length+',1fr);gap:4px"><div></div>';
  cols.forEach(function(c){ h+='<div class="mono" style="font-size:10px;color:var(--faint);text-align:center">'+c+'h</div>'; });
  rows.forEach(function(r,ri){
    h+='<div style="font-size:11px;color:var(--mist);display:flex;align-items:center">'+r+'</div>';
    cols.forEach(function(c,ci){
      var v=(Math.sin(ri*1.4+ci*0.9)+1)/2*0.8+0.15;
      var col = v>0.75?'rgba(95,211,163,0.85)':(v>0.45?'rgba(244,184,96,0.7)':'rgba(255,107,129,0.55)');
      h+='<div style="height:22px;border-radius:6px;background:'+col+';opacity:'+(0.35+v*0.65)+'"></div>';
    });
  });
  h+='</div><div style="display:flex;gap:14px;margin-top:12px;font-size:11px;color:var(--mist)">'+
    '<span style="display:inline-flex;align-items:center;gap:6px"><span style="width:10px;height:10px;border-radius:3px;background:var(--mint)"></span>Óptima</span>'+
    '<span style="display:inline-flex;align-items:center;gap:6px"><span style="width:10px;height:10px;border-radius:3px;background:var(--amber)"></span>Ajustada</span>'+
    '<span style="display:inline-flex;align-items:center;gap:6px"><span style="width:10px;height:10px;border-radius:3px;background:var(--rose)"></span>Faltante</span></div>';
  return h;
}
function statCard(label,value,sub,accent){

    '<div style="display:flex;align-items:center;gap:10px;padding:4px 8px 18px">'+

function headerHTML(){
  var titles={dashboard:"Resumen operativo",horario:"Horario semanal",solicitudes:"Solicitudes",equipo:"Equipo",settings:"Configuración",mi:"Mi espacio"};

      '<button class="btn" data-act="publish" style="display:flex;align-items:center;gap:8px;padding:10px 18px;border-radius:12px;background:var(--iris);color:#0B0C13;font-size:13px;font-weight:700">'+icon('send',{size:16,color:'#0B0C13'})+'<span class="lbl">Publicar</span></button>'+

function toastHTML(){
  if(!state.toast) return "";
  var t=state.toast, border=t.type==="gap"?'var(--rose)':'var(--mint)';
  var ic = t.type==="gap"?icon('alert',{size:16,color:'var(--rose)'}):icon('check',{size:16,color:'var(--mint)'});
  return '<div class="toast" style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:10px;padding:12px 18px;border-radius:14px;background:rgba(16,18,32,0.95);border:1px solid '+border+';color:var(--chalk);font-size:13px;box-shadow:0 12px 40px rgba(0,0,0,.5);max-width:90vw;z-index:50">'+ic+t.msg+'</div>';
}
function whyHTML(){
  if(!state.why) return "";
  return '<div data-backdrop="1" style="position:fixed;inset:0;background:rgba(5,6,12,0.6);backdrop-filter:blur(4px);display:grid;place-items:center;padding:20px;z-index:60">'+
    '<div data-modalbody="1" class="glass" style="max-width:480px;padding:24px;background:rgba(16,18,32,0.98)">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">'+
        '<div style="display:flex;align-items:center;gap:10px"><div style="width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--iris),var(--amber));display:grid;place-items:center">'+icon('sparkles',{size:15,color:'#0B0C13'})+'</div><span class="display" style="font-weight:600">Explicación del horario</span></div>'+
        '<span data-act="closewhy" style="cursor:pointer;color:var(--mist)">'+icon('x',{size:18,color:'var(--mist)'})+'</span>'+

      '<ul style="margin:0;padding-left:18px;font-size:13.5px;line-height:1.7;color:var(--mist)">'+
        '<li>Había <b style="color:var(--chalk)">2 agentes con mayor calificación</b> que solicitaron el mismo turno.</li>'+
        '<li>El algoritmo priorizó cubrir <b style="color:var(--chalk)">Phones</b>, donde tu skill era necesario.</li>'+
        '<li>En las <b style="color:var(--chalk)">últimas 3 semanas</b> ya recibiste tu opción 1, así que la equidad pesó a favor de otros.</li>'+
      '</ul>'+
      '<div style="margin-top:16px;padding:10px 12px;border-radius:10px;background:var(--irisSoft);font-size:12.5px;color:var(--iris2)">Recibiste tu <b>opción 2 (10 AM – 6 PM)</b> 3 de 5 días esta semana.</div>'+

function mainHTML(){
  var v=state.view, body="";
  if(v==="dashboard") body=dashboardHTML();
  else if(v==="horario") body=scheduleHTML();
  else if(v==="solicitudes") body=requestsHTML();
  else if(v==="equipo") body=teamHTML();
  else if(v==="settings") body=settingsHTML();
  else if(v==="mi") body=agentHTML();
  return '<main style="flex:1;min-width:0;padding:22px clamp(16px,3vw,34px) 60px">'+headerHTML()+body+'</main>';

/* ============================ RENDER ============================ */
function render(){
  document.getElementById('app').innerHTML =
    '<div style="display:flex;min-height:100vh">'+railHTML()+mainHTML()+'</div>'+toastHTML()+whyHTML();
}

/* ============================ EVENTS ============================ */
var root = document.getElementById('app');
root.addEventListener('click', function(e){
  var el;
  if((el=e.target.closest('[data-act]'))){
    var act=el.getAttribute('data-act');
    if(act==='generate'){ state.schedule[state.dayIdx]=autoAssign(state.dayIdx+Math.floor(Math.random()*3)); fire("Horario generado (simulación). Ajustalo y luego publicá.","ok"); return; }
    if(act==='publish'){
      var day=state.schedule[state.dayIdx];
      var gaps=TASKS.filter(function(t){return (day.lanes[t.id]||[]).length<t.req;});
      if(gaps.length) fire("Publicación bloqueada: faltan agentes en "+gaps.map(function(g){return g.name;}).join(", ")+".","gap");
      else fire("Horario publicado. Se notificó a los agentes ✓","ok");
      return;
    }
    if(act==='why'){ state.why=true; render(); return; }
    if(act==='closewhy'){ state.why=false; render(); return; }
    if(act==='cancelsel'){ state.sel=null; render(); return; }
  }
  if((el=e.target.closest('[data-backdrop]')) && !e.target.closest('[data-modalbody]')){ state.why=false; render(); return; }
  if((el=e.target.closest('[data-nav]'))){ state.view=el.getAttribute('data-nav'); state.sel=null; render(); return; }
  if((el=e.target.closest('[data-role]'))){
    state.role=el.getAttribute('data-role');
    if(state.role==='agent') state.view='mi'; else if(state.view==='mi') state.view='horario';
    state.sel=null; render(); return;
  }
  if((el=e.target.closest('[data-day]'))){ state.dayIdx=parseInt(el.getAttribute('data-day'),10); state.sel=null; render(); return; }
  // agent chip: select/deselect
  if((el=e.target.closest('[data-agent]'))){
    var id=parseInt(el.getAttribute('data-agent'),10), from=el.getAttribute('data-from');
    if(state.sel && state.sel.id===id && state.sel.from===from) state.sel=null;
    else state.sel={id:id, from:from};
    render(); return;
  }
  // place into a lane
  if((el=e.target.closest('[data-lane]'))){
    if(state.sel){ moveAgent(state.sel.id, state.sel.from, el.getAttribute('data-lane')); state.sel=null; render(); }
    return;
  }
  if((el=e.target.closest('[data-drop]'))){
    if(state.sel){ moveAgent(state.sel.id, state.sel.from, 'bench'); state.sel=null; render(); }
    return;
  }
});
root.addEventListener('dragstart', function(e){
  var el=e.target.closest('[data-agent]');
  if(el){ drag={ id:parseInt(el.getAttribute('data-agent'),10), from:el.getAttribute('data-from') }; try{ e.dataTransfer.effectAllowed='move'; e.dataTransfer.setData('text/plain', String(drag.id)); }catch(err){} }
});
root.addEventListener('dragover', function(e){
  if(e.target.closest('[data-lane]') || e.target.closest('[data-drop]')) e.preventDefault();
});
root.addEventListener('drop', function(e){
  e.preventDefault();
  if(!drag) return;
  var laneEl=e.target.closest('[data-lane]'), to = laneEl?laneEl.getAttribute('data-lane'):(e.target.closest('[data-drop]')?'bench':null);
  if(to){ moveAgent(drag.id, drag.from, to); drag=null; render(); }
});

render();
</script>
